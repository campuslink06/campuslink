  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
    import { getDatabase, ref as databaseRef, get, set, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getStorage, ref as storageRef, uploadString, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

    const storeApi = window.firebaseStoreApi = {
      enabled: false,
      error: null,
      ready: Promise.resolve(false),
      async loadStore() {
        return null;
      },
      async saveStore() {
        return false;
      },
      async uploadFile(note) {
        return note;
      },
      async deleteFile() {
        return false;
      },
      watchStore() {
        return () => {};
      }
    };

    const config = window.FIREBASE_CONFIG || {};
    const requiredKeys = ["apiKey", "authDomain", "projectId", "appId", "storageBucket", "databaseURL"];
    if (requiredKeys.some((key) => !config[key])) {
      storeApi.error = "Missing Firebase config.";
    } else {
      storeApi.ready = (async () => {
        try {
          const firebaseApp = initializeApp(config);
          analyticsSupported()
            .then((supported) => {
              if (supported) {
                window.firebaseAnalytics = getAnalytics(firebaseApp);
              }
            })
            .catch(() => {
              // Ignore analytics issues; core database and storage should still work.
            });
          const db = getDatabase(firebaseApp);
          const storage = getStorage(firebaseApp);
          const storeRef = databaseRef(db, "campusSeller/websiteState");

          storeApi.enabled = true;
          storeApi.loadStore = async () => {
            const snapshot = await get(storeRef);
            return snapshot.exists() ? snapshot.val() : null;
          };
          storeApi.watchStore = (onUpdate, onError) => onValue(
            storeRef,
            (snapshot) => onUpdate(snapshot.exists() ? snapshot.val() : null),
            (error) => {
              storeApi.error = error instanceof Error ? error.message : String(error);
              if (typeof onError === "function") {
                onError(error);
              }
            }
          );
          storeApi.uploadFile = async (note) => {
            if (!note || !note.uploadDataUrl) {
              return {
                ...note,
                uploadDataUrl: "",
                uploadUrl: note && note.uploadUrl ? note.uploadUrl : "",
                storagePath: note && note.storagePath ? note.storagePath : ""
              };
            }

            const safeName = String(note.uploadName || `${note.title || "resource"}.pdf`).replace(/[^\w.\-]+/g, "-");
            const filePath = note.storagePath || `resources/${note.id || Date.now()}-${safeName}`;
            const fileRef = storageRef(storage, filePath);
            await uploadString(fileRef, note.uploadDataUrl, "data_url");
            const uploadUrl = await getDownloadURL(fileRef);

            return {
              ...note,
              uploadDataUrl: "",
              uploadUrl,
              storagePath: filePath
            };
          };
          storeApi.deleteFile = async (filePath) => {
            if (!filePath) {
              return false;
            }

            await deleteObject(storageRef(storage, filePath));
            return true;
          };
          storeApi.saveStore = async (payload) => {
            const allNotes = await Promise.all((payload.allNotes || []).map(async (note) => {
              if (note.uploadDataUrl && (!note.storagePath || !note.uploadUrl)) {
                return storeApi.uploadFile(note);
              }

              return {
                ...note,
                uploadDataUrl: "",
                uploadUrl: note.uploadUrl || "",
                storagePath: note.storagePath || ""
              };
            }));

            const cleanPayload = {
              ...payload,
              allNotes,
              updatedAt: Date.now()
            };

            await set(storeRef, cleanPayload);
            return cleanPayload;
          };

          return true;
        } catch (error) {
          storeApi.enabled = false;
          storeApi.error = error instanceof Error ? error.message : String(error);
          return false;
        }
      })();
    }
  </script>

  <script>
    const app = window.app = {};

    app.STORAGE_KEY = "campus-seller-private-access-v2";
    app.OWNER_ACCESS_KEY = "chhapi@1234";
    app.DEVELOPER_STORE_NAME = "Developer Private Store";
    app.MAX_UPLOAD_SIZE_BYTES = 10 * 1024 * 1024;

    app.BRANCHES = [
      { id: "cse", name: "Computer Science", icon: "ðŸ’»" },
      { id: "mech", name: "Mechanical", icon: "âš™ï¸" },
      { id: "elec", name: "Electrical", icon: "âš¡" },
      { id: "civil", name: "Civil", icon: "ðŸ—ï¸" },
      { id: "ece", name: "Electronics", icon: "ðŸ“Ÿ" }
    ];

    app.INITIAL_NOTES = [
      { id: 1, branch: "cse", title: "Data Structures & Algorithms", price: 199, rating: 4.8, pages: 120, format: "PDF", author: "Dr. Smith", sellerId: "owner", sellerName: "Developer Private Store" },
      { id: 2, branch: "cse", title: "Operating Systems Pro", price: 149, rating: 4.5, pages: 85, format: "E-Book", author: "Prof. J. Doe", sellerId: "owner", sellerName: "Developer Private Store" },
      { id: 3, branch: "mech", title: "Thermodynamics Masterclass", price: 299, rating: 4.9, pages: 200, format: "PDF", author: "Engr. Robert", sellerId: "owner", sellerName: "Developer Private Store" }
    ];

    app.blankNote = () => ({ title: "", branch: "cse", author: "", format: "PDF", price: "", uploadName: "", uploadDataUrl: "", uploadUrl: "", uploadSize: 0, storagePath: "" });
    app.blankVerify = () => ({ name: "", email: "", branch: "cse", sellerCode: "", inviteCode: "", reason: "" });
    app.blankSellerLogin = () => ({ email: "", sellerCode: "" });

    app.els = {
      notice: document.getElementById("notice"),
      sellerBadge: document.getElementById("sellerBadge"),
      searchInput: document.getElementById("searchInput"),
      authBtn: document.getElementById("authBtn"),
      auxBtn: document.getElementById("auxBtn"),
      main: document.getElementById("main")
    };

    document.getElementById("year").textContent = new Date().getFullYear();

    app.esc = (value) => String(value).replace(/[&<>"']/g, (match) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    }[match]));

    app.money = (value) => new Intl.NumberFormat("en-IN", {
      style: "currency",
      currency: "INR",
      maximumFractionDigits: 0
    }).format(Number(value) || 0);

    app.formatBytes = (bytes) => {
      const value = Number(bytes) || 0;
      if (!value) {
        return "0 KB";
      }
      if (value >= 1024 * 1024) {
        return `${(value / (1024 * 1024)).toFixed(1)} MB`;
      }
      return `${Math.max(1, Math.round(value / 1024))} KB`;
    };

    app.stamp = () => new Date().toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" });
    app.tx = () => "TXN" + Math.random().toString(36).slice(2, 11).toUpperCase();
    app.sellerId = () => "SELLER-" + Math.random().toString(36).slice(2, 10).toUpperCase();
    app.requestId = () => "REQ-" + Math.random().toString(36).slice(2, 10).toUpperCase();

    app.branch = (id) => app.BRANCHES.find((item) => item.id === id) || null;
    app.resourceMetaForFormat = (format) => {
      if (format === "Book" || format === "E-Book") {
        return { price: 299, pages: 1 };
      }
      if (format === "Handwritten Notes" || format === "Handwritten") {
        return { price: 149, pages: 1 };
      }
      return { price: 99, pages: 1 };
    };
    app.noteWithDefaults = (note) => ({
      ...app.resourceMetaForFormat(note.format),
      ...note,
      sellerId: note.sellerId || "owner",
      sellerName: note.sellerName || app.DEVELOPER_STORE_NAME,
      uploadName: note.uploadName || "",
      uploadDataUrl: note.uploadDataUrl || "",
      uploadUrl: note.uploadUrl || "",
      uploadSize: Number(note.uploadSize) || 0,
      storagePath: note.storagePath || ""
    });

    app.downloadUploadedFile = function (note) {
      const fileHref = note ? (note.uploadDataUrl || note.uploadUrl || "") : "";
      if (!fileHref) {
        return false;
      }

      const link = document.createElement("a");
      link.href = fileHref;
      link.download = note.uploadName || `${note.title || "resource"}.pdf`;
      if (!note.uploadDataUrl) {
        link.target = "_blank";
        link.rel = "noopener";
      }
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      return true;
    };

    app.buildStorePayload = function () {
      return {
        allNotes: app.state.allNotes.map((note) => ({
          ...note,
          uploadName: note.uploadName || "",
          uploadDataUrl: note.uploadDataUrl || "",
          uploadUrl: note.uploadUrl || "",
          uploadSize: Number(note.uploadSize) || 0,
          storagePath: note.storagePath || ""
        })),
        sellerRequests: app.state.sellerRequests.map((item) => ({ ...item })),
        verifiedSellers: app.state.verifiedSellers.map((item) => ({ ...item }))
      };
    };

    app.cacheStorePayload = function (payload) {
      try {
        window.localStorage.setItem(app.STORAGE_KEY, JSON.stringify(payload));
      } catch (error) {
        // Ignore storage failures on restricted file:// origins.
      }
    };

    app.applyStorePayload = function (payload) {
      if (!payload || typeof payload !== "object") {
        return false;
      }

      app.state.allNotes = Array.isArray(payload.allNotes) && payload.allNotes.length ? payload.allNotes.map(app.noteWithDefaults) : app.INITIAL_NOTES.map(app.noteWithDefaults);
      app.state.sellerRequests = Array.isArray(payload.sellerRequests) ? payload.sellerRequests : [];
      app.state.verifiedSellers = Array.isArray(payload.verifiedSellers) ? payload.verifiedSellers : [];
      return true;
    };

    app.syncFromFirebase = async function () {
      const storeApi = window.firebaseStoreApi;
      if (!storeApi || !storeApi.ready) {
        return false;
      }

      try {
        const ready = await storeApi.ready;
        if (!ready) {
          return false;
        }

        const remotePayload = await storeApi.loadStore();
        if (remotePayload) {
          storeApi.error = null;
          app.applyStorePayload(remotePayload);
          app.cacheStorePayload(app.buildStorePayload());
          if (typeof app.render === "function") {
            app.render();
          }
          return true;
        }

        const seededPayload = await storeApi.saveStore(app.buildStorePayload());
        if (seededPayload) {
          storeApi.error = null;
          app.applyStorePayload(seededPayload);
          app.cacheStorePayload(app.buildStorePayload());
          if (typeof app.render === "function") {
            app.render();
          }
        }
        return true;
      } catch (error) {
        storeApi.error = error instanceof Error ? error.message : String(error);
        if (typeof app.renderMain === "function") {
          app.renderMain();
        }
        return false;
      }
    };

    app.startFirebaseSync = async function () {
      const storeApi = window.firebaseStoreApi;
      if (!storeApi || !storeApi.ready || typeof storeApi.watchStore !== "function") {
        return false;
      }

      try {
        const ready = await storeApi.ready;
        if (!ready) {
          return false;
        }

        if (typeof app.stopFirebaseSync === "function") {
          app.stopFirebaseSync();
        }

        app.stopFirebaseSync = storeApi.watchStore(
          (remotePayload) => {
            if (!remotePayload) {
              return;
            }

            storeApi.error = null;
            app.applyStorePayload(remotePayload);
            app.cacheStorePayload(app.buildStorePayload());
            if (typeof app.render === "function") {
              app.render();
            }
          },
          (error) => {
            storeApi.error = error instanceof Error ? error.message : String(error);
            if (typeof app.renderMain === "function") {
              app.renderMain();
            }
          }
        );

        return true;
      } catch (error) {
        storeApi.error = error instanceof Error ? error.message : String(error);
        if (typeof app.renderMain === "function") {
          app.renderMain();
        }
        return false;
      }
    };

    app.firebaseStatus = function () {
      const storeApi = window.firebaseStoreApi;
      if (!storeApi) {
        return "Firebase sync is not available in this browser session.";
      }
      if (storeApi.error) {
        return `Firebase sync error: ${storeApi.error}`;
      }
      if (storeApi.enabled) {
        return "Firebase sync is active. Remote listings should appear on every device.";
      }
      return "Firebase sync is preparing.";
    };

    app.readStore = function () {
      try {
        const raw = window.localStorage.getItem(app.STORAGE_KEY);
        if (!raw) {
          return {
            allNotes: app.INITIAL_NOTES.map(app.noteWithDefaults),
            sellerRequests: [],
            verifiedSellers: []
          };
        }

        const parsed = JSON.parse(raw);
        return {
          allNotes: Array.isArray(parsed.allNotes) && parsed.allNotes.length ? parsed.allNotes.map(app.noteWithDefaults) : app.INITIAL_NOTES.map(app.noteWithDefaults),
          sellerRequests: Array.isArray(parsed.sellerRequests) ? parsed.sellerRequests : [],
          verifiedSellers: Array.isArray(parsed.verifiedSellers) ? parsed.verifiedSellers : []
        };
      } catch (error) {
        return {
          allNotes: app.INITIAL_NOTES.map(app.noteWithDefaults),
          sellerRequests: [],
          verifiedSellers: []
        };
      }
    };

    app.writeStore = function () {
      const payload = app.buildStorePayload();
      app.cacheStorePayload(payload);

      const storeApi = window.firebaseStoreApi;
      if (!storeApi || !storeApi.ready) {
        return Promise.resolve(false);
      }

      return storeApi.ready
        .then((ready) => ready ? storeApi.saveStore(payload) : null)
        .then((remotePayload) => {
          if (!remotePayload) {
            storeApi.error = storeApi.error || "Firebase is not ready yet.";
            if (typeof app.renderMain === "function") {
              app.renderMain();
            }
            return false;
          }

          storeApi.error = null;
          app.applyStorePayload(remotePayload);
          app.cacheStorePayload(app.buildStorePayload());
          if (typeof app.renderMain === "function") {
            app.renderMain();
          }
          return true;
        })
        .catch((error) => {
          storeApi.error = error instanceof Error ? error.message : String(error);
          if (typeof app.renderMain === "function") {
            app.renderMain();
          }
          return false;
        });
    };

    const stored = app.readStore();

    app.state = {
      view: "home",
      role: "buyer",
      activeSellerId: null,
      showNotice: true,
      allNotes: stored.allNotes,
      sellerRequests: stored.sellerRequests,
      verifiedSellers: stored.verifiedSellers,
      selectedBranch: null,
      selectedItem: null,
      search: "",
      receipt: null,
      newNote: app.blankNote(),
      verifyForm: app.blankVerify(),
      sellerLogin: app.blankSellerLogin()
    };

    app.isOwner = () => app.state.role === "owner";
    app.isVerifiedSeller = () => false;
    app.canSell = () => app.isOwner();
    app.currentSeller = () => (app.isOwner() ? { id: "owner", name: app.DEVELOPER_STORE_NAME } : null);
    app.selected = () => app.state.allNotes.find((note) => note.id === app.state.selectedItem) || null;

    app.inventoryNotes = function () {
      if (app.isOwner()) {
        return app.state.allNotes;
      }

      return [];
    };

    app.filteredNotes = function () {
      let notes = app.state.allNotes.slice();
      if (app.state.selectedBranch) {
        notes = notes.filter((note) => note.branch === app.state.selectedBranch);
      }

      const query = app.state.search.trim().toLowerCase();
      if (query) {
        notes = notes.filter((note) => [note.title, note.author, note.format].join(" ").toLowerCase().includes(query));
      }

      return notes;
    };
  </script>

        appRun.state.view = "branch";
        appRun.renderMain();
        return;

      if (action === "home") {

        appRun.render();
        return;

      if (action === "buy" || action === "preview") {
        appRun.state.selectedItem = Number(button.dataset.id);
        appRun.state.view = "checkout";
        appRun.renderMain();
        return;
      }

      if (action === "delete") {
        const noteId = Number(button.dataset.id);

        if (!note) {
          return;

            });

        if (appRun.state.selectedItem === noteId) {
          appRun.state.selectedItem = null;

        appRun.writeStore();
        appRun.renderMain();
        return;

          return;

          appRun.state.verifiedSellers = [{

        if (!appRun.downloadUploadedFile(note)) {
          window.alert("No uploaded file is attached to this listing yet.");

        appRun.resetPage();
        appRun.render();

  <script>
    const appForms = window.app;

    appForms.readUploadedFile = function (file) {
      return new Promise((resolve, reject) => {
        if (!file) {
          resolve({ uploadName: "", uploadDataUrl: "", uploadSize: 0 });
          return;
        }

        if (!/\.(pdf|epub|jpg|jpeg|png|webp)$/i.test(file.name)) {
          reject(new Error("Please choose a PDF, EPUB, JPG, PNG, or WEBP file."));
          return;
        }

        if (file.size > appForms.MAX_UPLOAD_SIZE_BYTES) {
          reject(new Error(`File must be ${appForms.formatBytes(appForms.MAX_UPLOAD_SIZE_BYTES)} or smaller.`));
          return;
        }

        const reader = new FileReader();
        reader.onload = () => resolve({
          uploadName: file.name,
          uploadDataUrl: String(reader.result || ""),
          uploadSize: file.size
        });
        reader.onerror = () => reject(new Error("Unable to read the selected file."));
        reader.readAsDataURL(file);
      });
    };

    appForms.els.main.addEventListener("input", (event) => {
      const requestForm = event.target.closest("form[data-form='verify-request']");
      const loginForm = event.target.closest("form[data-form='seller-login']");
      const noteForm = event.target.closest("form[data-form='note']");

      if (noteForm && event.target.name && event.target.type !== "file") {
        appForms.state.newNote[event.target.name] = event.target.value;
      }

      if (requestForm && event.target.name) {
        appForms.state.verifyForm[event.target.name] = event.target.value;
      }

      if (loginForm && event.target.name) {
        appForms.state.sellerLogin[event.target.name] = event.target.value;
      }
    });

    appForms.els.main.addEventListener("change", async (event) => {
      const noteForm = event.target.closest("form[data-form='note']");
      if (!noteForm || event.target.name !== "pdfFile") {
        return;
      }

      try {
        const upload = await appForms.readUploadedFile(event.target.files && event.target.files[0]);
        appForms.state.newNote = { ...appForms.state.newNote, ...upload };
      } catch (error) {
        appForms.state.newNote = { ...appForms.state.newNote, uploadName: "", uploadDataUrl: "", uploadSize: 0 };
        event.target.value = "";
        window.alert(error.message);
      }

      appForms.renderMain();
    });

    appForms.els.main.addEventListener("submit", (event) => {
      const noteForm = event.target.closest("form[data-form='note']");
      const requestForm = event.target.closest("form[data-form='verify-request']");
      const loginForm = event.target.closest("form[data-form='seller-login']");

      if (noteForm) {
        event.preventDefault();

        const title = appForms.state.newNote.title.trim();
        const author = appForms.state.newNote.author.trim();
        const format = appForms.state.newNote.format;
        const price = Number(appForms.state.newNote.price);
        const resourceMeta = appForms.resourceMetaForFormat(format);

        if (!title || !author || !format || !price || price < 1 || !appForms.state.newNote.uploadDataUrl) {
          window.alert("Please complete title, branch, author, resource type, price, and upload file.");
          return;
        }

        appForms.state.allNotes = [{
          id: Date.now(),
          branch: appForms.state.newNote.branch,
          title,
          price,
          rating: 5,
          pages: resourceMeta.pages,
          format,
          author,
          uploadName: appForms.state.newNote.uploadName,
          uploadDataUrl: appForms.state.newNote.uploadDataUrl,
          uploadSize: appForms.state.newNote.uploadSize,
          sellerId: "owner",
          sellerName: appForms.DEVELOPER_STORE_NAME
        }, ...appForms.state.allNotes];

        appForms.state.newNote = appForms.blankNote();
        appForms.writeStore().then((synced) => {
          if (!synced) {
            window.alert("This resource was saved only on this device. Check Firebase Realtime Database and Storage rules so it appears on other devices.");
          }
        });
        appForms.renderMain();
        return;
      }

      if (requestForm) {
        event.preventDefault();
        window.alert("Selling access is restricted to developers only.");
        return;
      }

      if (loginForm) {
        event.preventDefault();
        window.alert("Developer dashboard access is private.");
        return;
      }
    });

    appForms.render();
    if (typeof appForms.syncFromFirebase === "function") {
      appForms.syncFromFirebase();
    }
    if (typeof appForms.startFirebaseSync === "function") {
      appForms.startFirebaseSync();
    }
  </script>
</body>
